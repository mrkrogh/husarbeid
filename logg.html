<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Husarbeidsplan — Logg</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0ece4;
    --card: #ffffff;
    --text: #1c1917;
    --muted: #78716c;
    --border: #e5e0d8;
    --isaac-bg: #dbeafe; --isaac-fg: #1e3a8a;
    --lucy-bg:  #fce7f3; --lucy-fg:  #831843;
    --sabela-bg:#d1fae5; --sabela-fg:#064e3b;
    --genesis-bg:#fef3c7; --genesis-fg:#78350f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    padding: 32px 16px 64px;
    color: var(--text);
  }

  header { max-width: 700px; margin: 0 auto 6px; }
  header h1 { font-size: clamp(20px, 4vw, 26px); font-weight: 600; letter-spacing: -0.5px; }

  .subtitle {
    max-width: 700px;
    margin: 0 auto 6px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
  }

  .disclaimer {
    max-width: 700px;
    margin: 0 auto 20px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    font-style: italic;
  }

  .back-link {
    display: inline-block;
    max-width: 700px;
    margin: 0 auto 28px;
    font-size: 12px;
    color: var(--muted);
    text-decoration: none;
    border-bottom: 1px solid var(--border);
    transition: color 0.15s;
  }
  .back-link:hover { color: var(--text); }

  .sections {
    display: flex;
    flex-direction: column;
    gap: 28px;
    max-width: 700px;
    margin: 0 auto;
  }

  .month-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .log-card {
    background: var(--card);
    border-radius: 16px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    overflow: hidden;
  }

  .log-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 16px;
    border-bottom: 1px solid var(--border);
  }
  .log-row:last-child { border-bottom: none; }

  .log-date {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
    width: 76px;
  }

  .log-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 999px;
    flex-shrink: 0;
  }
  .pb-isaac   { background: var(--isaac-bg);   color: var(--isaac-fg); }
  .pb-lucy    { background: var(--lucy-bg);    color: var(--lucy-fg); }
  .pb-sabela  { background: var(--sabela-bg);  color: var(--sabela-fg); }
  .pb-genesis { background: var(--genesis-bg); color: var(--genesis-fg); }

  .log-task {
    font-size: 12px;
    color: var(--text);
    flex: 1;
  }

  .log-detail {
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
  }

  .empty-state {
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
  }
</style>
</head>
<body>

<header>
  <h1>📋 Husarbeidslogg</h1>
</header>
<p class="subtitle">Oversikt over fullførte oppgaver</p>
<p class="disclaimer">Hvis noen har byttet dager, vises det ikke i denne oversikten. Her vises bare hvilke datoer og oppgaver hver person har blitt tildelt.</p>
<a class="back-link" href="index.html">← Tilbake til planen</a>

<div class="sections" id="sections"></div>

<script>
  // ═══════════════════════════════════════════════════
  //  DATAKILDE — hold synkronisert med index.html
  // ═══════════════════════════════════════════════════
  const HUSPLAN = {
    gronland: {
      isaac:   { start: '02.05.2026', interval: 14 },
      lucy:    { start: '25.04.2026', interval: 14 },
      sabela:  { start: '25.04.2026', interval: 14 },
      genesis: { start: '02.05.2026', interval: 14 },
    },
    bad: {
      isaac:   { start: '10.05.2026', interval: 28, firstLabel: 'speilet' },
      lucy:    { start: '26.04.2026', interval: 28, firstLabel: 'speilet' },
      sabela:  { start: '26.04.2026', interval: 28, firstLabel: 'dusjen'  },
      genesis: { start: '10.05.2026', interval: 28, firstLabel: 'dusjen'  },
    },
    navn:   { isaac: 'Isaac', lucy: 'Lucy', sabela: 'Sabela', genesis: 'Genesis' },
    labels: { dusjen: 'Dusjen osv.', speilet: 'Speilet osv.' },
  };

  // ── HELPERS ──
  function parseDate(str) {
    const [d, m, y] = str.split('.').map(Number);
    return new Date(Date.UTC(y, m - 1, d, 12, 0, 0));
  }

  function fmtDate(date) {
    return String(date.getUTCDate()).padStart(2, '0') + '.' +
           String(date.getUTCMonth() + 1).padStart(2, '0') + '.' +
           date.getUTCFullYear();
  }

  function getToday() {
    const n = new Date();
    return new Date(Date.UTC(n.getFullYear(), n.getMonth(), n.getDate(), 12, 0, 0));
  }

  function addDays(date, days) {
    return new Date(date.getTime() + days * 86400000);
  }

  // ── COLLECT ENTRIES ──
  const today   = getToday();
  const logFrom = parseDate('27.04.2026'); // Vis kun fra og med denne datoen
  const people  = ['isaac', 'lucy', 'sabela', 'genesis'];
  const entries = [];

  people.forEach(function(person) {
    // Vaske badet
    const badCfg   = HUSPLAN.bad[person];
    const labArr   = ['dusjen', 'speilet'];
    const firstIdx = labArr.indexOf(badCfg.firstLabel);
    let cursor = parseDate(badCfg.start);
    let i = 0;
    while (cursor < today) {
      if (cursor >= logFrom) {
        entries.push({
          date:   new Date(cursor),
          dateStr: fmtDate(cursor),
          person,
          task:   'Vaske badet',
          detail: HUSPLAN.labels[labArr[(firstIdx + i) % 2]],
        });
      }
      cursor = addDays(cursor, badCfg.interval);
      i++;
    }

    // Handle på Grønland
    const gCfg = HUSPLAN.gronland[person];
    cursor = parseDate(gCfg.start);
    while (cursor < today) {
      if (cursor >= logFrom) {
        entries.push({
          date:   new Date(cursor),
          dateStr: fmtDate(cursor),
          person,
          task:   'Handle på Grønland',
          detail: '',
        });
      }
      cursor = addDays(cursor, gCfg.interval);
    }
  });

  // Sort newest first
  entries.sort(function(a, b) { return b.date - a.date; });

  // ── RENDER ──
  const sections = document.getElementById('sections');

  if (entries.length === 0) {
    sections.innerHTML = '<p class="empty-state">Ingen fullførte oppgaver ennå.</p>';
  } else {
    const byMonth = {};
    entries.forEach(function(e) {
      const key = e.date.getUTCFullYear() + '-' +
                  String(e.date.getUTCMonth() + 1).padStart(2, '0');
      if (!byMonth[key]) byMonth[key] = [];
      byMonth[key].push(e);
    });

    const monthNames = ['Januar','Februar','Mars','April','Mai','Juni',
                        'Juli','August','September','Oktober','November','Desember'];

    Object.keys(byMonth).sort().reverse().forEach(function(key) {
      const parts = key.split('-');
      const title = monthNames[parseInt(parts[1], 10) - 1] + ' ' + parts[0];

      const rows = byMonth[key].map(function(e) {
        return '<div class="log-row">' +
          '<span class="log-date">' + e.dateStr + '</span>' +
          '<span class="log-badge pb-' + e.person + '">' + HUSPLAN.navn[e.person] + '</span>' +
          '<span class="log-task">' + e.task + '</span>' +
          (e.detail ? '<span class="log-detail">' + e.detail + '</span>' : '') +
          '</div>';
      }).join('');

      sections.innerHTML +=
        '<div>' +
          '<div class="month-title">' + title + '</div>' +
          '<div class="log-card">' + rows + '</div>' +
        '</div>';
    });
  }
</script>

</body>
</html>
